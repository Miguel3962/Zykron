<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zykron</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

:root{
--bg:#0f172a;
--panel:#020617;
--card:#111827;
--accent:#22c55e;
--soft:#1f2937;
--text:#ffffff;
--bar:#22c55e;
}

body.blue{--bg:#0b3b5a;--panel:#082f49;--card:#0e4a6d;--accent:#38bdf8;--soft:#0f3a55;--bar:#38bdf8}
body.purple{--bg:#2e1065;--panel:#1e1b4b;--card:#312e81;--accent:#a78bfa;--soft:#4338ca;--bar:#a78bfa}
body.green{--bg:#052e16;--panel:#022c22;--card:#064e3b;--accent:#4ade80;--soft:#065f46;--bar:#4ade80}
body.orange{--bg:#431407;--panel:#7c2d12;--card:#9a3412;--accent:#fb923c;--soft:#c2410c;--bar:#fb923c}

body{margin:0;font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text)}

.app{max-width:950px;margin:auto;min-height:100vh;background:var(--panel);display:flex;flex-direction:column}

.header{height:70px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid var(--soft)}
.title{font-size:18px;font-weight:600}

.settingsBtn{font-size:20px;cursor:pointer;background:var(--soft);border:none;color:white;padding:8px 12px;border-radius:8px}

.content{padding:20px;flex:1}

.grid{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:720px){.grid{grid-template-columns:1fr 1fr}}

.card{background:var(--card);padding:18px;border-radius:14px;box-shadow:0 10px 25px rgba(0,0,0,0.4)}

input{width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:10px;background:var(--soft);color:white}

button{padding:8px 12px;border:none;border-radius:10px;background:var(--accent);color:white;font-weight:600;cursor:pointer}

.habit{display:flex;align-items:center;gap:8px;padding:10px;background:var(--soft);border-radius:10px;margin-top:8px}
.habit span{flex:1}

.deleteBtn{background:#ef4444}
.editBtn{background:#f59e0b}

.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}

.day{background:var(--soft);padding:12px;border-radius:6px;font-size:12px;text-align:center;cursor:pointer;min-height:55px}

.reminderItem{background:var(--soft);padding:10px;border-radius:8px;margin-top:8px;display:flex;gap:6px;align-items:center}
.reminderItem span{flex:1;font-size:13px}

canvas{width:100%;height:260px}

.settingsPanel{position:fixed;top:0;right:-340px;width:340px;height:100%;background:var(--panel);border-left:1px solid var(--soft);padding:20px;transition:0.3s;overflow:auto}
.settingsPanel.open{right:0}

.settingItem{background:var(--soft);padding:12px;border-radius:10px;margin-bottom:14px}

.themeGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}

.themeGrid{
display:grid;
grid-template-columns:1fr 1fr;
gap:8px;
margin-top:8px
}

/* LOGIN INPUT */

#loginScreen input{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #374151;
background:#111827;
color:white;
margin-bottom:12px;
}

#loginScreen input::placeholder{
color:#9ca3af;
}

.settingsPanel h2 span{
background:var(--soft);
padding:4px 10px;
border-radius:8px;
}

</style>

</head>

<body>

  
<div class="app">

  <div id="loginScreen" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
">

<div style="
background:#1f2937;
padding:35px;
border-radius:16px;
width:320px;
text-align:center;
border:1px solid #374151;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
">


<h2>Zykron</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p style="cursor:pointer;color:#38bdf8" onclick="showRegister()">Criar conta</p>

</div>

<div id="registerBox" style="
background:#1f2937;
padding:35px;
border-radius:16px;
width:320px;
text-align:center;
border:1px solid #374151;
box-shadow:0 15px 40px rgba(0,0,0,0.6);
position:absolute;
display:none;
">

<h2>Criar conta</h2>

<input id="regName" placeholder="Nome">
<input id="regEmail" placeholder="Email">
<input id="regPass" type="password" placeholder="Senha">
<input id="regPass2" type="password" placeholder="Confirmar senha">

<button onclick="register()">Registrar</button>

<p style="cursor:pointer;color:#38bdf8" onclick="showLogin()">Voltar</p>

</div>

</div>


<div class="header">
<div class="title" id="greeting">Olá</div>
<button class="settingsBtn" onclick="toggleSettings()">⚙</button>
</div>

<div class="content">

<div class="grid">

<div class="card">
<h3>Adicionar hábito</h3>
<input id="habitInput" placeholder="Ex: Treinar">
<button onclick="addHabit()">Adicionar</button>
<div id="habitList"></div>
</div>

<div class="card">
<h3>📊 Gráfico semanal</h3>
<canvas id="weekChart"></canvas>
</div>

<div class="card">
<h3>📅 Calendário</h3>
<p>Clique em um dia para adicionar lembrete.</p>
<div id="calendar" class="calendar"></div>
</div>

<div class="card">
<h3>🔔 Lembretes</h3>
<div id="reminderList"></div>
</div>

</div>

</div>

</div>

<div id="settings" class="settingsPanel">

<h2 style="display:flex;align-items:center;gap:10px">
<span onclick="toggleSettings()" style="cursor:pointer;font-size:22px">←</span>
Configurações
</h2>

<div class="settingItem">
<b>Seu nome</b>
<input id="profileName" placeholder="Digite seu nome">
<button onclick="saveProfile()">Salvar</button>
</div>

<div class="settingItem">
<b>Tema</b>
<div class="themeGrid">
<button onclick="setTheme('default')">Padrão</button>
<button onclick="setTheme('blue')">Azul</button>
<button onclick="setTheme('purple')">Roxo</button>
<button onclick="setTheme('green')">Verde</button>
<button onclick="setTheme('orange')">Laranja</button>
</div>
</div>

<div class="settingItem">
<button onclick="logout()" style="width:100%;background:#ef4444">
🚪 Sair da conta
</button>
</div>

</div>
<div id="colorPicker" style="
display:none;
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--panel);
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
z-index:2000;
width:260px;
text-align:center;
">

<h3 style="margin-top:0">Escolha a cor</h3>

<div style="
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:15px;
">

<button onclick="selectColor('red')" style="background:red;width:45px;height:45px;border-radius:12px;border:none"></button>

<button onclick="selectColor('orange')" style="background:orange;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('green')" style="background:green;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('blue')" style="background:blue;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('purple')" style="background:purple;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('indigo')" style="background:indigo;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('teal')" style="background:teal;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('brown')" style="background:brown;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('darkred')" style="background:darkred;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('darkgreen')" style="background:darkgreen;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('darkblue')" style="background:darkblue;width:45px;height:45px;border-radius:12px"></button>

<button onclick="selectColor('darkviolet')" style="background:darkviolet;width:45px;height:45px;border-radius:12px"></button>


</div>

<button onclick="closeColorPicker()" style="
margin-top:15px;
background:#ef4444;
width:100%;
padding:8px;
border-radius:8px;
">

Cancelar

</button>

</div>


<script>

let habits = []
let calendarData = {}
let weeklyData = [0,0,0,0,0,0,0]
let profile = localStorage.getItem('Zykron_profile') || ""
let currentUser = null
let selectedDay = null
let reminderText = ""

function getUserKey() {
  return currentUser ? `Zykron_${currentUser.replace(/[@.]/g, '_')}` : null;
}

function loadUserData() {
  const key = getUserKey();
  if (!key) return;
  
  const habitsStr = localStorage.getItem(`${key}_habits`);
  if (habitsStr) habits = JSON.parse(habitsStr);
  
  const calendarStr = localStorage.getItem(`${key}_calendar`);
  if (calendarStr) calendarData = JSON.parse(calendarStr);
  
  const weeklyStr = localStorage.getItem(`${key}_weekly`);
  if (weeklyStr) weeklyData = JSON.parse(weeklyStr);
}

function saveUserData() {
  const key = getUserKey();
  if (!key) return;
  
  localStorage.setItem(`${key}_habits`, JSON.stringify(habits));
  localStorage.setItem(`${key}_calendar`, JSON.stringify(calendarData));
  localStorage.setItem(`${key}_weekly`, JSON.stringify(weeklyData));
}

if(currentUser){
document.getElementById("loginScreen").style.display="none"
updateGreeting()
}


function closeColorPicker(){
document.getElementById("colorPicker").style.display="none"
}


function toggleSettings(){
document.getElementById('settings').classList.toggle('open')
}

function saveProfile(){
const name=document.getElementById('profileName').value
profile=name
localStorage.setItem('Zykron_profile',name)
updateGreeting()
}

function updateGreeting(){
if(profile) document.getElementById('greeting').innerText="Olá " + profile
}

function setTheme(theme){
document.body.className=""
if(theme!=='default') document.body.classList.add(theme)
localStorage.setItem('Zykron_theme',theme)
drawChart()
}

function addHabit(){
const input=document.getElementById('habitInput')
const name=input.value.trim()
if(!name) return

habits.push({name,done:false})
input.value=""

renderHabits()
drawChart()
saveUserData()
}

function deleteHabit(i){
if(confirm("Deseja apagar este hábito?")){
habits.splice(i,1)
renderHabits()
drawChart()
saveUserData()
}
}

function renderHabits(){
const list=document.getElementById('habitList')
list.innerHTML=""

habits.forEach((habit,i)=>{

const div=document.createElement('div')
div.className='habit'

const btn = habit.done
 ? '<button disabled>✔</button>'
 : `<button onclick="completeHabit(${i})">✔</button>`


div.innerHTML=`
<span>${habit.name}</span>
${btn}
<button class="deleteBtn" onclick="deleteHabit(${i})">Deletar</button>
`

list.appendChild(div)
})
}

function completeHabit(i){
if(habits[i].done) return

habits[i].done=true

let today=new Date().getDay()
weeklyData[today]++

renderHabits()
drawChart()
saveUserData()
}

function drawChart(){

const canvas = document.getElementById('weekChart')
const ctx = canvas.getContext('2d')

canvas.width = 500
canvas.height = 260

ctx.clearRect(0,0,canvas.width,canvas.height)

const style = getComputedStyle(document.body)
const barColor = style.getPropertyValue('--bar')

const days = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab']

let max = Math.max(...weeklyData,5)

for(let i=0;i<7;i++){

let value = weeklyData[i]
let barHeight = (value/max)*150

let x = 60 + i*60
let y = 200 - barHeight

ctx.fillStyle = barColor
ctx.fillRect(x,y,40,barHeight)

/* número em cima da barra */
ctx.fillStyle = "white"
ctx.font = "500 20px 'Poppins', sans-serif"
ctx.fillText(value,x+14,y-8)

/* dias da semana */
ctx.font = "600 15px 'Poppins', sans-serif"
ctx.fillText(days[i],x+6,240)

}

}

function generateCalendar(){

const calendar=document.getElementById('calendar')
calendar.innerHTML=""

for(let i=1;i<=30;i++){

const day=document.createElement('div')

day.className='day'

day.innerText=i

if(calendarData[i]){
let count=calendarData[i].length

let mark=document.createElement('div')
mark.style.fontSize='10px'

day.style.background = calendarData[i][0].color


day.appendChild(mark)
}


day.onclick=()=>{
let text = prompt("Novo lembrete:")
if(!text) return

selectedDay = i
reminderText = text

document.getElementById("colorPicker").style.display="block"

}

calendar.appendChild(day)
}

}
function selectColor(color){

document.getElementById("colorPicker").style.display="none"

if(selectedDay === null) return

if(!calendarData[selectedDay]) calendarData[selectedDay]=[]


calendarData[selectedDay].push({
text:reminderText,
color:color
})

generateCalendar()
renderReminders()
saveUserData()
}

function renderReminders(){

const list=document.getElementById('reminderList')
list.innerHTML=""

Object.keys(calendarData).forEach(day=>{

calendarData[day].forEach((item,index)=>{

const div=document.createElement('div')
div.className='reminderItem'

let text = typeof item === "string" ? item : item.text

div.innerHTML=`
<span>Dia ${day}: ${text}</span>
<button class="editBtn" onclick="editReminder(${day},${index})">Editar</button>
<button class="deleteBtn" onclick="deleteReminder(${day},${index})">Apagar</button>
`

list.appendChild(div)

})

})

}


function editReminder(day,index){

let item = calendarData[day][index]
let current = typeof item === "string" ? item : item.text

let text=prompt("Editar lembrete:",current)

if(text===null) return

if(text===""){
if(confirm("Apagar lembrete?")) calendarData[day].splice(index,1)
}else{

if(typeof item === "string"){
calendarData[day][index] = text
}else{
calendarData[day][index].text = text
}

}

if(calendarData[day].length===0) delete calendarData[day]

generateCalendar()
renderReminders()
saveUserData()

}

function deleteReminder(day,index){
if(confirm("Deseja apagar este lembrete?")){
calendarData[day].splice(index,1)
if(calendarData[day].length===0) delete calendarData[day]

generateCalendar()
renderReminders()
saveUserData()
}
}
function showRegister(){
document.getElementById("registerBox").style.display="block"
}

function showLogin(){
document.getElementById("registerBox").style.display="none"
}


function logout(){

localStorage.removeItem("currentUser")
location.reload()

}


function startApp(){
  loadUserData()
  document.getElementById("loginScreen").style.display="none"
  updateGreeting()
  renderHabits()
  generateCalendar()
  renderReminders()
  drawChart()
}


renderHabits()
generateCalendar()
renderReminders()
drawChart()
updateGreeting()

const savedTheme=localStorage.getItem('Zykron_theme')
if(savedTheme) setTheme(savedTheme)

</script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getAuth, 
  createUserWithEmailAndPassword, 
  signInWithEmailAndPassword,
  onAuthStateChanged,
  signOut 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCMXfcOuKLYDqUdpxwStZx2yuK_gaQ4yWw",
  authDomain: "zykron-cb5ec.firebaseapp.com",
  projectId: "zykron-cb5ec",
  storageBucket: "zykron-cb5ec.firebasestorage.app",
  messagingSenderId: "841574015275",
  appId: "1:841574015275:web:07ba033c86aaf7676ca56e"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 🔐 LOGIN
window.login = async function(){
  const email = document.getElementById("loginEmail").value;
  const pass = document.getElementById("loginPass").value;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch {
    alert("Email ou senha incorretos");
  }
};

// 🆕 CADASTRO
window.register = async function(){
  const email = document.getElementById("regEmail").value;
  const pass = document.getElementById("regPass").value;
  const pass2 = document.getElementById("regPass2").value;

  if(pass !== pass2){
    alert("Senhas não coincidem");
    return;
  }

  if(pass.length < 6){
    alert("Senha precisa ter 6 caracteres");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    alert("Conta criada!");
    showLogin();
  } catch (error) {
    if(error.code === "auth/email-already-in-use"){
      alert("Email já cadastrado");
    } else {
      alert("Erro ao criar conta");
    }
  }
};

// 🔁 AUTO LOGIN
onAuthStateChanged(auth, (user) => {
  if(user){
    currentUser = user.email;
    localStorage.setItem('currentUser', user.email);
    startApp();
  } else {
    currentUser = null;
    localStorage.removeItem('currentUser');
  }
});

// 🚪 LOGOUT
window.logout = async function(){
  await signOut(auth);
  location.reload();
};
</script>
</body>
</html>
